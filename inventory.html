<script>
// ══ ログインガード ══
(function() {
  var raw = sessionStorage.getItem('ims_session');
  if (!raw) {
    localStorage.setItem('ims_redirect', 'inventory.html');
    location.replace('index.html');
    throw new Error('redirect');
  }
  try {
    var s = JSON.parse(raw);
    if (!s || !s.empCode) throw new Error();
    // セッションは消費しない（タブ内遷移では維持）
    window.IMS_SESSION = s;
  } catch(e) {
    sessionStorage.removeItem('ims_session');
    localStorage.setItem('ims_redirect', 'inventory.html');
    location.replace('index.html');
    throw new Error('redirect');
  }
})();
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫 | 在庫管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7; --sidebar-bg: #1a1f2e; --sidebar-active: #2d3550;
    --sidebar-text: #a0a8c0; --accent: #3b82f6; --accent-hover: #2563eb;
    --card-bg: #ffffff; --text-primary: #1e2436; --text-secondary: #6b7280;
    --border: #e5e7eb; --sidebar-width: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text-primary); display: flex; min-height: 100vh; }
  .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
  .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .sidebar-logo span { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: #fff; text-transform: uppercase; }
  .sidebar-logo small { display: block; font-size: 10px; color: var(--sidebar-text); margin-top: 2px; }
  .sidebar-nav { padding: 16px 0; flex: 1; }
  .nav-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #4a5270; padding: 8px 20px 4px; font-weight: 500; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--sidebar-text); text-decoration: none; font-size: 13.5px; font-weight: 400; transition: all 0.18s ease; cursor: pointer; border-left: 3px solid transparent; }
  .nav-item:hover { background: var(--sidebar-active); color: #fff; }
  .nav-item.active { background: var(--sidebar-active); color: #fff; border-left-color: var(--accent); font-weight: 500; }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon, .nav-item:hover .nav-icon { opacity: 1; }
  .main { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
  .topbar { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px; display: flex; align-items: center; }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .content { padding: 24px 32px; flex: 1; }
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px 20px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .form-group input { height: 38px; border: 1px solid var(--border); border-radius: 7px; padding: 0 12px; font-size: 13px; font-family: inherit; color: var(--text-primary); background: #fafafa; outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--accent); background: #fff; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn { height: 38px; padding: 0 20px; border: none; border-radius: 7px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-reset { background: #f3f4f6; color: var(--text-secondary); }
  .btn-reset:hover { background: #e5e7eb; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #f8f9fb; }
  th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:hover td { background: #f8fbff; }
  .code-cell { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); }
  .img-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 7px; border: 1px solid var(--border); }
  .no-img { width: 44px; height: 44px; border-radius: 7px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #aaa; }
  .empty-state { text-align: center; padding: 56px; color: var(--text-secondary); font-size: 13px; }
  .stock-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; }
  .stock-positive { background: #dcfce7; color: #16a34a; }
  .stock-zero     { background: #fee2e2; color: #dc2626; }
  .stock-low      { background: #fff7ed; color: #ea580c; }
  .summary-strip { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .summary-chip { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; display: flex; flex-direction: column; gap: 2px; min-width: 140px; }
  .summary-chip .s-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .summary-chip .s-value { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text-primary); }

  /* ═══════════════════════════════
     スマートフォン対応
  ═══════════════════════════════ */
  @media (max-width: 768px) {
    /* サイドバー非表示 */
    .sidebar { display: none; }

    /* メインを全幅に */
    .main { margin-left: 0; }

    /* トップバー */
    .topbar { padding: 0 16px; }

    /* コンテンツ余白調整・下部ナビ分の余白 */
    .content { padding: 16px; padding-bottom: 88px; }

    /* カードのパディング縮小 */
    .card { padding: 16px; }

    /* フォームグリッドを1列 */
    .form-grid { grid-template-columns: 1fr; }
    .form-row-wide { grid-column: 1; }

    /* テーブルフォントサイズ */
    table { font-size: 12px; }
    th, td { padding: 8px 8px; }

    /* メニューグリッド（トップページ） */
    .menu-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .menu-card { padding: 16px 12px; gap: 10px; }
    .menu-card-icon { width: 40px; height: 40px; }
    .menu-card-info h3 { font-size: 13px; }
    .menu-card-info p { font-size: 11px; }

    /* サマリーバー */
    .summary-bar { grid-template-columns: 1fr 1fr; }
    .summary-strip { gap: 8px; }
    .summary-chip { min-width: 0; flex: 1; padding: 8px 12px; }
  }

  /* ══════════════ 下部タブナビ ══════════════ */
  .bottom-nav {
    display: none; /* PCでは非表示 */
  }
  @media (max-width: 768px) {
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: #1a1f2e;
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 200;
      padding: 0;
    }
    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: #6b7a9f;
      text-decoration: none;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 8px 4px;
      transition: color 0.15s;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }
    .bottom-nav-item svg {
      width: 22px;
      height: 22px;
    }
    .bottom-nav-item.active {
      color: #60a5fa;
    }
    .bottom-nav-item:hover {
      color: #93c5fd;
    }
    .bottom-nav-item .nav-dot {
      display: none;
    }
    .bottom-nav-item.active .nav-dot {
      display: block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #60a5fa;
      margin-top: -2px;
    }
  }


  /* 登録タブ：PCでは非表示、スマホのみ表示 */
  .nav-item.mobile-only { display: none; }
  @media (max-width: 768px) {
    .nav-item.mobile-only { display: flex; }
  }
</style>

<script>


// ── トップバーにログインユーザー情報を表示 ──
(function() {
  function injectUserInfo() {
    var topbar = document.querySelector('.topbar');
    if (!topbar || !window.IMS_SESSION) return;
    if (topbar.querySelector('.topbar-user')) return;

    var wrap = document.createElement('div');
    wrap.className = 'topbar-user';
    wrap.style.cssText = 'display:flex;align-items:center;gap:10px;margin-left:auto;';

    var nameSpan = document.createElement('span');
    nameSpan.style.cssText = 'font-size:12px;color:var(--text-secondary);';
    var bold = document.createElement('span');
    bold.style.cssText = 'font-weight:600;color:var(--text-primary);';
    bold.textContent = window.IMS_SESSION.empName || window.IMS_SESSION.empCode;
    var code = document.createElement('span');
    code.style.cssText = 'margin-left:6px;font-family:DM Mono,monospace;font-size:11px;color:#aaa;';
    code.textContent = '(' + window.IMS_SESSION.empCode + ')';
    nameSpan.appendChild(bold);
    nameSpan.appendChild(code);

    var btn = document.createElement('button');
    btn.textContent = 'ログアウト';
    btn.style.cssText = 'height:30px;padding:0 12px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:11px;font-weight:500;color:#6b7280;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;transition:all .15s;';
    btn.addEventListener('mouseover', function() { this.style.borderColor='#ef4444'; this.style.color='#ef4444'; });
    btn.addEventListener('mouseout',  function() { this.style.borderColor='#e5e7eb'; this.style.color='#6b7280'; });
    btn.addEventListener('click', imsLogout);

    wrap.appendChild(nameSpan);
    wrap.appendChild(btn);
    topbar.appendChild(wrap);
  }
  document.addEventListener('DOMContentLoaded', injectUserInfo);
})();

function imsLogout() {
  if (!confirm('ログアウトしますか？')) return;
  sessionStorage.removeItem('ims_session');
  location.replace('index.html');
}
const KEYS = { inv: 'ims_inventory', prod: 'ims_products', site: 'ims_sites', cls: 'ims_classifications' };
const load = k => JSON.parse(localStorage.getItem(k) || '[]');

// 操作履歴から商品×事業所ごとの在庫数を計算
// 入庫(01)・返却(04) → 加算  /  出庫(02)・持ち出し(03) → 減算
function calcStockMap() {
  const inv = load(KEYS.inv);
  const map = {};
  inv.forEach(r => {
    const key = `${r.productCode}|${r.siteCode}`;
    if (!map[key]) map[key] = 0;
    const qty = parseInt(r.qty) || 0;
    if (r.opCode === '01' || r.opCode === '04') map[key] += qty;
    else if (r.opCode === '02' || r.opCode === '03') map[key] -= qty;
  });
  return map;
}

function getClassName(clsCode) {
  for (const c of load(KEYS.cls)) {
    const sub = c.subs && c.subs.find(s => s.code === clsCode);
    if (sub) return `${c.name} > ${sub.name}`;
  }
  return clsCode || '—';
}

function stockBadge(qty) {
  if (qty > 10) return `<span class="stock-badge stock-positive">${qty}</span>`;
  if (qty > 0)  return `<span class="stock-badge stock-low">${qty}</span>`;
  return `<span class="stock-badge stock-zero">${qty}</span>`;
}

function doSearch() {
  const nameVal = document.getElementById('s-name').value.trim();
  const codeVal = document.getElementById('s-code').value.trim();
  const janVal  = document.getElementById('s-jan').value.trim();
  const siteVal = document.getElementById('s-site').value.trim();

  const products  = load(KEYS.prod);
  const sites     = load(KEYS.site);
  const inv       = load(KEYS.inv);
  const stockMap  = calcStockMap();

  // 商品を絞り込み（単独でも複数でも対応）
  let filteredProds = products;
  if (nameVal) filteredProds = filteredProds.filter(p => p.name && p.name.includes(nameVal));
  if (codeVal) filteredProds = filteredProds.filter(p => p.code && p.code.includes(codeVal));
  if (janVal)  filteredProds = filteredProds.filter(p => p.jan  && p.jan.includes(janVal));

  // 事業所を絞り込み
  let filteredSites = siteVal
    ? sites.filter(s => s.code && s.code.includes(siteVal))
    : sites;

  // 在庫履歴に登場した事業所コードも補完
  const invSiteCodes = [...new Set(inv.map(r => r.siteCode))];
  const siteMap = {};
  sites.forEach(s => siteMap[s.code] = s);

  // 表示する (商品 × 事業所) の組み合わせを生成
  const rows = [];

  if (siteVal) {
    // 事業所コード指定あり
    filteredSites.forEach(site => {
      filteredProds.forEach(prod => {
        const key = `${prod.code}|${site.code}`;
        rows.push({ prod, site, qty: stockMap[key] || 0 });
      });
    });
  } else {
    // 事業所コード指定なし：履歴に登場した事業所×絞り込み商品
    if (invSiteCodes.length > 0) {
      invSiteCodes.forEach(sc => {
        const site = siteMap[sc] || { code: sc, name: sc };
        filteredProds.forEach(prod => {
          const key = `${prod.code}|${sc}`;
          // その組み合わせに操作履歴があるものだけ表示
          if (inv.some(r => r.productCode === prod.code && r.siteCode === sc)) {
            rows.push({ prod, site, qty: stockMap[key] || 0 });
          }
        });
      });
    } else {
      // 操作履歴がない場合は全事業所×全商品
      filteredSites.forEach(site => {
        filteredProds.forEach(prod => {
          const key = `${prod.code}|${site.code}`;
          rows.push({ prod, site, qty: stockMap[key] || 0 });
        });
      });
    }
  }

  renderTable(rows);
  updateSummary(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById('result-body');
  document.getElementById('result-count').textContent = rows.length ? `${rows.length} 件` : '';
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">該当する在庫データがありません</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(({ prod, site, qty }) => {
    const imgHtml = prod.image
      ? `<img class="img-thumb" src="${prod.image}" alt="${prod.name}">`
      : `<div class="no-img">NO IMG</div>`;
    return `<tr>
      <td class="code-cell">${prod.code}</td>
      <td class="code-cell">${prod.jan || '—'}</td>
      <td style="font-weight:500;">${prod.name}</td>
      <td>${imgHtml}</td>
      <td style="font-size:12px;color:var(--text-secondary);">${getClassName(prod.classification)}</td>
      <td>${site.name || site.code}<span style="font-family:'DM Mono',monospace;font-size:11px;color:#aaa;margin-left:4px;">(${site.code})</span></td>
      <td>${stockBadge(qty)}</td>
    </tr>`;
  }).join('');
}

function updateSummary(rows) {
  const strip = document.getElementById('summary-strip');
  strip.style.display = rows.length ? 'flex' : 'none';
  document.getElementById('sum-count').textContent   = rows.length;
}

function resetSearch() {
  ['s-name','s-code','s-jan','s-site'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('result-body').innerHTML =
    '<tr><td colspan="7" class="empty-state">検索条件を入力して「検索」をクリックしてください</td></tr>';
  document.getElementById('result-count').textContent = '';
  document.getElementById('summary-strip').style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
