<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ログイン | 在庫管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --sidebar-bg: #1a1f2e;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --card-bg: #ffffff;
    --text-primary: #1e2436;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--sidebar-bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* 背景装飾 */
  body::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    pointer-events: none;
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  /* ロゴ部分 */
  .login-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px; height: 56px;
    background: var(--accent);
    border-radius: 14px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(59,130,246,0.35);
  }
  .login-logo svg { width: 28px; height: 28px; color: #fff; }
  .login-header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.01em;
  }
  .login-header p {
    font-size: 13px;
    color: #6b7a9f;
    margin-top: 6px;
  }

  /* カード */
  .login-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .form-group label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: #9ca3af;
    pointer-events: none;
  }
  .input-wrap input {
    width: 100%;
    height: 46px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    padding: 0 12px 0 38px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text-primary);
    background: #fafafa;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-wrap input:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  .input-wrap input.error {
    border-color: #ef4444;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
  }

  /* パスワード表示トグル */
  .toggle-pw {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #9ca3af;
    padding: 2px;
    display: flex;
    align-items: center;
  }
  .toggle-pw:hover { color: var(--text-secondary); }

  /* エラーメッセージ */
  .error-msg {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #dc2626;
    margin-bottom: 16px;
    align-items: center;
    gap: 8px;
  }
  .error-msg.show { display: flex; }

  /* ログインボタン */
  .btn-login {
    width: 100%;
    height: 48px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
    box-shadow: 0 4px 14px rgba(59,130,246,0.35);
  }
  .btn-login:hover { background: var(--accent-hover); box-shadow: 0 6px 20px rgba(59,130,246,0.4); transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ローディングスピナー */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ヒント */
  .login-hint {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .login-hint strong { color: var(--text-primary); }

  /* フッター */
  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: #3d4a6b;
  }

  @media (max-width: 480px) {
    .login-card { padding: 24px 20px; }
    .login-header h1 { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-header">
    <div class="login-logo">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 17H5a2 2 0 00-2 2v0a2 2 0 002 2h14a2 2 0 002-2v0a2 2 0 00-2-2h-4M9 17V9m0 8h6V9m0 8V9M9 9h6"/>
      </svg>
    </div>
    <h1>在庫管理システム</h1>
    <p>担当者コードとパスワードでログインしてください</p>
  </div>

  <div class="login-card">

    <!-- エラーメッセージ -->
    <div class="error-msg" id="error-msg">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-text">担当者コードまたはパスワードが正しくありません</span>
    </div>

    <!-- 担当者コード -->
    <div class="form-group">
      <label>担当者コード</label>
      <div class="input-wrap">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="emp-code" placeholder="担当者コードを入力"
          autocomplete="username" inputmode="text"
          onkeydown="if(event.key==='Enter')document.getElementById('password').focus()" />
      </div>
    </div>

    <!-- パスワード -->
    <div class="form-group">
      <label>パスワード</label>
      <div class="input-wrap">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" id="password" placeholder="パスワードを入力"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()" />
        <button class="toggle-pw" type="button" onclick="togglePw()" id="pw-toggle" title="パスワードを表示">
          <svg id="pw-eye" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="pw-eye-off" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        ログイン
      </span>
    </button>


  </div>

  <div class="login-footer">Inventory Management System &copy; 2025</div>
</div>

<script>
const KEYS = { emp: 'ims_employees', session: 'ims_session' };
const load = k => JSON.parse(localStorage.getItem(k) || '[]');
const saveSession = v => sessionStorage.setItem(KEYS.session, JSON.stringify(v));

// ─── ログイン済みなら即リダイレクト ───────────────
(function() {
  const sess = sessionStorage.getItem(KEYS.session);
  if (sess) {
    try {
      const s = JSON.parse(sess);
      if (s && s.empCode) {
        // リダイレクト先があればそこへ、なければindex.html
        const dest = sessionStorage.getItem('ims_redirect') || 'index.html';
        sessionStorage.removeItem('ims_redirect');
        location.replace(dest);
      }
    } catch(e) {}
  }
})();

function togglePw() {
  const input = document.getElementById('password');
  const eye    = document.getElementById('pw-eye');
  const eyeOff = document.getElementById('pw-eye-off');
  if (input.type === 'password') {
    input.type = 'text';
    eye.style.display = 'none';
    eyeOff.style.display = 'block';
  } else {
    input.type = 'password';
    eye.style.display = 'block';
    eyeOff.style.display = 'none';
  }
}

function showError(msg) {
  const box = document.getElementById('error-msg');
  document.getElementById('error-text').textContent = msg;
  box.classList.add('show');
  document.getElementById('emp-code').classList.add('error');
  document.getElementById('password').classList.add('error');
}

function clearError() {
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('emp-code').classList.remove('error');
  document.getElementById('password').classList.remove('error');
}

['emp-code','password'].forEach(id => {
  document.getElementById(id).addEventListener('input', clearError);
});

function doLogin() {
  const empCode  = document.getElementById('emp-code').value.trim();
  const password = document.getElementById('password').value;

  if (!empCode)  { showError('担当者コードを入力してください'); return; }
  if (!password) { showError('パスワードを入力してください'); return; }

  const btn = document.getElementById('login-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  // 少し遅延を入れてUXを改善
  setTimeout(() => {
    const employees = load(KEYS.emp);
    const accounts  = JSON.parse(localStorage.getItem('ims_accounts') || '[]');

    if (employees.length === 0) {
      btn.classList.remove('loading');
      btn.disabled = false;
      showError('担当者が登録されていません。管理者に連絡してください。');
      return;
    }

    // 担当者コードが登録済みか確認
    const emp = employees.find(e => e.code === empCode);
    if (!emp) {
      btn.classList.remove('loading');
      btn.disabled = false;
      showError('担当者コードまたはパスワードが正しくありません');
      return;
    }

    // アカウント情報からパスワード検証
    // ims_accountsに登録がない場合（旧データ互換）は固定形式にフォールバック
    const account = accounts.find(a => a.code === empCode);
    const expectedPw = account ? account.password : ('password-' + empCode);

    if (password !== expectedPw) {
      btn.classList.remove('loading');
      btn.disabled = false;
      showError('担当者コードまたはパスワードが正しくありません');
      return;
    }

    // ログイン成功 → セッションに保存
    saveSession({ empCode: emp.code, empName: emp.name, loginAt: Date.now() });

    const dest = sessionStorage.getItem('ims_redirect') || 'index.html';
    sessionStorage.removeItem('ims_redirect');
    location.replace(dest);
  }, 400);
}

// フォーカスを担当者コード欄に
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('emp-code').focus();
});
</script>
</body>
</html>
